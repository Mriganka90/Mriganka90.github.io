<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background noise grid -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <!-- Accent glow blur -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
    </filter>
  </defs>

  <!-- Base dark background -->
  <rect width="1200" height="630" fill="#070707"/>

  <!-- Subtle grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Ambient peach glow — top left quadrant -->
  <ellipse cx="200" cy="180" rx="320" ry="220" fill="#FFCB94" opacity="0.055" filter="url(#softglow)"/>

  <!-- Ambient secondary glow — bottom right -->
  <ellipse cx="1050" cy="480" rx="260" ry="180" fill="#FFCB94" opacity="0.04" filter="url(#softglow)"/>

  <!-- Left accent bar -->
  <rect x="64" y="80" width="3" height="470" fill="#FFCB94" opacity="0.25"/>

  <!-- Top-left corner bracket -->
  <path d="M64 80 L64 64 L110 64" fill="none" stroke="#FFCB94" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom-right corner bracket -->
  <path d="M1136 550 L1136 566 L1090 566" fill="none" stroke="#FFCB94" stroke-width="1.5" opacity="0.6"/>

  <!-- MG Logo — scaled up at top left area -->
  <!-- Outer frame -->
  <rect x="94" y="105" width="108" height="60" rx="4" fill="#070707" stroke="#FFCB94" stroke-width="1.2" opacity="0.9"/>
  <!-- M letterform -->
  <path d="M104 153 L104 117 L121 139 L138 117 L138 153" stroke="#f0f0f0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- dot separator -->
  <circle cx="148" cy="135" r="3" fill="#FFCB94"/>
  <!-- G letterform -->
  <path d="M178 120C175 112 169 110 163 110C155 110 149 116 149 135C149 154 155 160 163 160C169 160 176 157 178 150L178 135L166 135" stroke="#FFCB94" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Monospace label under logo -->
  <text x="94" y="184" font-family="'Courier New', Courier, monospace" font-size="9" fill="#FFCB94" opacity="0.55" letter-spacing="2">PORTFOLIO  v3</text>

  <!-- Main name — large -->
  <text x="94" y="285" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" fill="#f0f0f0" letter-spacing="-1">Mriganka</text>
  <text x="94" y="365" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" fill="#f0f0f0" letter-spacing="-1">Ghosh</text>

  <!-- Peach accent underline on second name line -->
  <rect x="94" y="374" width="360" height="3" fill="#FFCB94" rx="1.5" opacity="0.8"/>

  <!-- Role line -->
  <text x="94" y="420" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FFCB94" letter-spacing="3">AUTOMATION DEVELOPER</text>

  <!-- Tagline -->
  <text x="94" y="455" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#888" letter-spacing="0.5">Industrial IoT  ·  OPC DA/HDA  ·  Node-RED  ·  AWS IoT Core</text>

  <!-- Divider line right section -->
  <line x1="720" y1="80" x2="720" y2="566" stroke="#1d1d1d" stroke-width="1"/>

  <!-- Right panel — tech stack chips -->
  <!-- Section label -->
  <text x="760" y="130" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FFCB94" opacity="0.6" letter-spacing="3">STACK</text>

  <!-- Tech tags — 2 column grid -->
  <!-- Row 1 -->
  <rect x="760" y="148" width="148" height="32" rx="6" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="834" y="169" font-family="'Courier New', Courier, monospace" font-size="12" fill="#f0f0f0" text-anchor="middle">Node-RED</text>

  <rect x="924" y="148" width="148" height="32" rx="6" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="998" y="169" font-family="'Courier New', Courier, monospace" font-size="12" fill="#f0f0f0" text-anchor="middle">OPC DA / HDA</text>

  <!-- Row 2 -->
  <rect x="760" y="196" width="148" height="32" rx="6" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="834" y="217" font-family="'Courier New', Courier, monospace" font-size="12" fill="#f0f0f0" text-anchor="middle">AWS IoT Core</text>

  <rect x="924" y="196" width="148" height="32" rx="6" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="998" y="217" font-family="'Courier New', Courier, monospace" font-size="12" fill="#f0f0f0" text-anchor="middle">Modbus RTU</text>

  <!-- Row 3 -->
  <rect x="760" y="244" width="148" height="32" rx="6" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="834" y="265" font-family="'Courier New', Courier, monospace" font-size="12" fill="#f0f0f0" text-anchor="middle">PostgreSQL</text>

  <rect x="924" y="244" width="148" height="32" rx="6" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="998" y="265" font-family="'Courier New', Courier, monospace" font-size="12" fill="#f0f0f0" text-anchor="middle">VBA / Excel</text>

  <!-- Row 4 -->
  <rect x="760" y="292" width="148" height="32" rx="6" fill="#131313" stroke="#FFCB94" stroke-width="1" opacity="0.85"/>
  <text x="834" y="313" font-family="'Courier New', Courier, monospace" font-size="12" fill="#FFCB94" text-anchor="middle">SQLite</text>

  <rect x="924" y="292" width="148" height="32" rx="6" fill="#131313" stroke="#FFCB94" stroke-width="1" opacity="0.85"/>
  <text x="998" y="313" font-family="'Courier New', Courier, monospace" font-size="12" fill="#FFCB94" text-anchor="middle">MQTT</text>

  <!-- Divider in right panel -->
  <line x1="760" y1="348" x2="1090" y2="348" stroke="#1d1d1d" stroke-width="1"/>

  <!-- Location block -->
  <text x="760" y="390" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FFCB94" opacity="0.6" letter-spacing="3">LOCATION</text>
  <text x="760" y="415" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#f0f0f0">Bengaluru, India</text>

  <!-- Stats block -->
  <text x="760" y="460" font-family="'Courier New', Courier, monospace" font-size="10" fill="#FFCB94" opacity="0.6" letter-spacing="3">EXPERIENCE</text>
  <text x="760" y="485" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#f0f0f0">Industrial Automation  &amp;  IoT</text>

  <!-- Bottom domain badge -->
  <rect x="760" y="520" width="330" height="36" rx="6" fill="#0e0e0e" stroke="#FFCB94" stroke-width="1" opacity="0.7"/>
  <text x="925" y="543" font-family="'Courier New', Courier, monospace" font-size="13" fill="#FFCB94" text-anchor="middle" opacity="0.9">mrigankag.dev</text>

  <!-- Bottom left — subtle watermark tag line -->
  <text x="94" y="560" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333" letter-spacing="1">// building the bridge between machines and data</text>

</svg>
